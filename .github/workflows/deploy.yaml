name: Deploy

on:
    workflow_dispatch:
        inputs:
            branch_hash:
                description: Branch hash (default) or revision to deploy
                default: main
            environments:
                description: The environment to deploy to
                type: choice
                default: testing
                options:
                    - testing
                    - production

jobs:
    deploy:
        permissions:
            contents: read
            packages: write
        name: Deploy to ${{inputs.environments}}
        uses: hathitrust/github_actions/.github/workflows/deploy.yml@98a7b0f67c16b968bb1f357ac50224dbfa789f3f # v2.0.2
        with:
            image: ghcr.io/${{ github.repository }}:${{ inputs.branch_hash || github.sha}}
            file: environments/metadata_processing/${{inputs.environments}}/post-zephir-image.txt
            CONFIG_REPO_FULL_NAME: ${{ vars.CONFIG_REPO_FULL_NAME }}
        secrets: inherit
